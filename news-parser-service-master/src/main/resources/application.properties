spring.application.name=news-parser-service
spring.datasource.url=jdbc:mysql://localhost:3313/business_sustainability
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.defer-datasource-initialization=true
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=60000
spring.datasource.hikari.maximum-pool-size=10

server.port=8080

yandex.translate.url={YANDEX_TRANSLATE_URL}
yandex.translate.folder-id={YANDEX_TRANSLATE_FOLDER_ID}
yandex.translate.api-key={YANDEX_TRANSLATE_API_KEY}

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true